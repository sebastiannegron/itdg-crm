name: Bug Report
description: Report a bug in the CRM platform
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - foundation
        - clients
        - documents
        - communications
        - portal
        - notifications
        - dashboard
        - settings
    validations:
      required: true
