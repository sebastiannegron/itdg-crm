name: Copilot PR Fix

on:
  workflow_run:
    workflows: ["API CI", "Web CI"]
    types: [completed]

permissions:
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.COPILOT_TRIGGER_PAT }}

jobs:
  mark-ready:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'copilot/')
    steps:
      - name: Find copilot PR
        id: find-pr
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --state open --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $BRANCH."
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Check all CI workflows passed
        if: steps.find-pr.outputs.pr_number != ''
        id: check-all
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.pr_number }}"
          FAILING=$(gh pr checks "$PR_NUMBER" --repo "${{ github.repository }}" --json state --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')
          if [ "$FAILING" != "0" ]; then
            echo "PR #$PR_NUMBER still has pending or failing checks. Waiting."
            echo "all_passed=false" >> "$GITHUB_OUTPUT"
          else
            echo "All checks passed for PR #$PR_NUMBER."
            echo "all_passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark PR as ready for review
        if: steps.find-pr.outputs.pr_number != '' && steps.check-all.outputs.all_passed == 'true'
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.pr_number }}"
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "Marking PR #$PR_NUMBER as ready for review..."
            gh pr ready "$PR_NUMBER" --repo "${{ github.repository }}"
          else
            echo "PR #$PR_NUMBER is already ready for review."
          fi
