name: Copilot Auto-Merge

on:
  check_suite:
    types: [completed]
  pull_request:
    types: [ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to merge manually"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run on successful check suites, ready_for_review, or manual dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      github.event.check_suite.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check kill switch
        id: killswitch
        run: |
          PAUSED=$(gh variable get COPILOT_PIPELINE_PAUSED 2>/dev/null || echo "false")
          echo "paused=$PAUSED" >> "$GITHUB_OUTPUT"
          if [ "$PAUSED" = "true" ]; then
            echo "Pipeline is paused. Exiting."
          fi

      - name: Find copilot PRs to merge
        if: steps.killswitch.outputs.paused != 'true'
        id: find-prs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            # Verify PR is from copilot
            AUTHOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
            if [ "$AUTHOR" != "Copilot" ] && [ "$AUTHOR" != "copilot-swe-agent" ] && [ "$AUTHOR" != "app/copilot-swe-agent" ]; then
              echo "PR #$PR_NUMBER is not from copilot (author: $AUTHOR). Exiting."
              echo "prs=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "prs=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            AUTHOR="${{ github.event.pull_request.user.login }}"
            if [ "$AUTHOR" != "Copilot" ] && [ "$AUTHOR" != "copilot-swe-agent[bot]" ] && [ "$AUTHOR" != "copilot-swe-agent" ]; then
              echo "PR #$PR_NUMBER is not from copilot (author: $AUTHOR). Exiting."
              echo "prs=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "prs=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          else
            # check_suite event — find copilot PR on the triggering branch
            BRANCH="${{ github.event.check_suite.head_branch }}"
            if [ -z "$BRANCH" ]; then
              echo "No branch found in check suite. Exiting."
              echo "prs=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Try both author identifiers — GitHub may use either depending on context
            PR_NUMBER=$(gh pr list --author "app/copilot-swe-agent" --state open --head "$BRANCH" --json number --jq '.[0].number // empty')
            if [ -z "$PR_NUMBER" ]; then
              PR_NUMBER=$(gh pr list --author "Copilot" --state open --head "$BRANCH" --json number --jq '.[0].number // empty')
            fi
            if [ -z "$PR_NUMBER" ]; then
              echo "No copilot PR found for branch $BRANCH."
              echo "prs=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "prs=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify CI and merge
        if: steps.killswitch.outputs.paused != 'true' && steps.find-prs.outputs.prs != ''
        id: merge
        run: |
          PR_NUMBER="${{ steps.find-prs.outputs.prs }}"
          echo "Checking PR #$PR_NUMBER..."

          # Mark draft PRs as ready for review
          IS_DRAFT=$(gh pr view "$PR_NUMBER" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "PR #$PR_NUMBER is a draft. Marking as ready for review..."
            gh pr ready "$PR_NUMBER"
          fi

          # Verify all checks pass
          CHECKS_STATUS=$(gh pr checks "$PR_NUMBER" --json state --jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED")] | length')
          if [ "$CHECKS_STATUS" != "0" ]; then
            echo "PR #$PR_NUMBER has failing or pending checks. Skipping merge."
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Squash merge
          echo "Merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          echo "merged=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Resolve linked issue
        if: steps.merge.outputs.merged == 'true'
        run: |
          PR_NUMBER="${{ steps.merge.outputs.pr_number }}"
          PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')

          # Try Closes #N pattern first
          CLOSES_NUMBER=$(echo "$PR_BODY" | grep -oP '(?i)closes?\s+#\K\d+' | head -1 || true)

          # Try to extract issue title from <issue_title> tags
          ISSUE_TITLE=$(echo "$PR_BODY" | grep -oP '(?<=<issue_title>).*?(?=</issue_title>)' | head -1 || true)

          if [ -n "$CLOSES_NUMBER" ]; then
            echo "Closing issue #$CLOSES_NUMBER (from Closes #N)..."
            gh issue close "$CLOSES_NUMBER" --comment "Closed by copilot PR #$PR_NUMBER via auto-merge pipeline."
          elif [ -n "$ISSUE_TITLE" ]; then
            # Match against open issue titles
            ISSUE_NUMBER=$(gh issue list --state open --json number,title --jq ".[] | select(.title == \"$ISSUE_TITLE\") | .number" | head -1 || true)
            if [ -n "$ISSUE_NUMBER" ]; then
              echo "Closing issue #$ISSUE_NUMBER (matched by title)..."
              gh issue close "$ISSUE_NUMBER" --comment "Closed by copilot PR #$PR_NUMBER via auto-merge pipeline."
            else
              echo "WARNING: Could not find open issue matching title: $ISSUE_TITLE"
            fi
          else
            echo "WARNING: PR #$PR_NUMBER has no linked issue. Manual close required."
          fi

      - name: Trigger orchestrator
        if: steps.merge.outputs.merged == 'true'
        run: |
          echo "Triggering orchestrator for next task..."
          gh workflow run copilot-orchestrator.yml
