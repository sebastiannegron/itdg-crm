name: Copilot CI Failure Notify

on:
  workflow_run:
    workflows: ["API CI", "Web CI"]
    types: [completed]

permissions:
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  notify-failure:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Find copilot PR on failing branch
        id: find-pr
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [ -z "$BRANCH" ]; then
            echo "No branch found. Exiting."
            exit 0
          fi

          if [[ "$BRANCH" != copilot/* ]]; then
            echo "Branch $BRANCH is not a copilot branch. Exiting."
            exit 0
          fi

          PR_NUMBER=$(gh pr list --state open --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $BRANCH."
            exit 0
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: steps.find-pr.outputs.pr_number != ''
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.pr_number }}"
          WORKFLOW="${{ github.event.workflow_run.name }}"
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          gh pr comment "$PR_NUMBER" --body "**CI failed:** [$WORKFLOW]($RUN_URL) — auto-merge blocked. Manual review required."
